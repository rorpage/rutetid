<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rutetid — Live Norwegian Transit</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #21262d;
      --text:    #e6edf3;
      --muted:   #7d8590;
      --accent:  #58a6ff;
      --bus:     #f78166;
      --rail:    #79c0ff;
      --tram:    #56d364;
      --metro:   #d2a8ff;
      --ferry:   #ffa657;
    }

    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    #app { display: flex; height: 100vh; }

    #sidebar {
      width: 320px;
      min-width: 320px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
      overflow: hidden;
    }

    #map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    .sidebar-header { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
    .wordmark { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .wordmark span { color: var(--accent); }
    .tagline { font-size: 11px; color: var(--muted); margin-top: 3px; letter-spacing: 0.3px; }

    .city-row { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
    .section-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .city-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .city-btn {
      font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
      padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .city-btn:hover { border-color: var(--accent); color: var(--accent); }
    .city-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

    .mode-row { padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .mode-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .mode-btn {
      font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 4px;
      border: 1px solid transparent; cursor: pointer; display: flex; align-items: center;
      gap: 5px; transition: opacity 0.15s; background: none;
    }
    .mode-btn .dot { width: 7px; height: 7px; border-radius: 50%; }
    .mode-btn.bus   { background: rgba(247,129,102,0.15); border-color: rgba(247,129,102,0.4); color: var(--bus); }
    .mode-btn.rail  { background: rgba(121,192,255,0.15); border-color: rgba(121,192,255,0.4); color: var(--rail); }
    .mode-btn.tram  { background: rgba(86,211,100,0.15);  border-color: rgba(86,211,100,0.4);  color: var(--tram); }
    .mode-btn.metro { background: rgba(210,168,255,0.15); border-color: rgba(210,168,255,0.4); color: var(--metro); }
    .mode-btn.ferry { background: rgba(255,166,87,0.15);  border-color: rgba(255,166,87,0.4);  color: var(--ferry); }
    .mode-btn .dot.bus   { background: var(--bus); }
    .mode-btn .dot.rail  { background: var(--rail); }
    .mode-btn .dot.tram  { background: var(--tram); }
    .mode-btn .dot.metro { background: var(--metro); }
    .mode-btn .dot.ferry { background: var(--ferry); }
    .mode-btn.dimmed { opacity: 0.3; }

    .stats-row { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 20px; }
    .stat { display: flex; flex-direction: column; gap: 1px; }
    .stat-num { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; line-height: 1; }
    .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

    .panel-header {
      padding: 12px 20px 8px; font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .panel-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 0; }
    .panel-close:hover { color: var(--text); }

    #departures-list { flex: 1; overflow-y: auto; padding: 0 20px 20px; }
    #departures-list::-webkit-scrollbar { width: 4px; }
    #departures-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .stop-name-header { font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-top: 4px; line-height: 1.3; }

    .departure-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .departure-row:last-child { border-bottom: none; }
    .dep-line {
      font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
      min-width: 36px; text-align: center; padding: 2px 6px; border-radius: 4px;
    }
    .dep-dest { flex: 1; font-size: 12px; color: var(--text); line-height: 1.2; }
    .dep-time { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; color: var(--accent); text-align: right; min-width: 42px; }
    .dep-time.soon { color: var(--bus); }
    .dep-realtime { font-size: 9px; color: var(--tram); margin-top: 1px; }

    .empty-state { color: var(--muted); font-size: 13px; text-align: center; padding: 32px 0; line-height: 1.6; }
    .empty-state .icon { font-size: 32px; display: block; margin-bottom: 8px; }
    .loading-state { color: var(--muted); font-size: 12px; text-align: center; padding: 24px 0; }

    #status-bar { padding: 8px 20px; border-top: 1px solid var(--border); font-size: 10px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--tram); flex-shrink: 0; }
    .status-dot.loading { background: var(--ferry); animation: pulse 1s infinite; }
    .status-dot.error   { background: var(--bus); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .map-hint {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(13,17,23,0.85); border: 1px solid var(--border); border-radius: 6px;
      padding: 8px 14px; font-size: 11px; color: var(--muted); pointer-events: none;
      backdrop-filter: blur(8px); white-space: nowrap; z-index: 500; transition: opacity 0.3s;
    }
    .map-hint.hidden { opacity: 0; pointer-events: none; }

    .leaflet-container { background: #0d1117; }
    .leaflet-popup-content-wrapper { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); color: var(--text); }
    .leaflet-popup-tip { background: var(--surface); }
    .leaflet-popup-content { margin: 12px 14px; font-family: 'Inter', sans-serif; }
    .vehicle-popup-line { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 13px; }
    .vehicle-popup-dest { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .vehicle-popup-updated { font-size: 10px; color: var(--muted); margin-top: 6px; }
  </style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="wordmark">rute<span>tid</span></div>
      <div class="tagline">Live Norwegian Transit — Powered by Entur</div>
    </div>

    <div class="city-row">
      <div class="section-label">City</div>
      <div class="city-btns">
        <button class="city-btn active" data-city="oslo">Oslo</button>
        <button class="city-btn" data-city="bergen">Bergen</button>
        <button class="city-btn" data-city="trondheim">Trondheim</button>
        <button class="city-btn" data-city="stavanger">Stavanger</button>
      </div>
    </div>

    <div class="mode-row">
      <div class="section-label">Modes</div>
      <div class="mode-btns">
        <button class="mode-btn bus" data-mode="bus"><span class="dot bus"></span>Bus</button>
        <button class="mode-btn rail" data-mode="rail"><span class="dot rail"></span>Rail</button>
        <button class="mode-btn tram" data-mode="tram"><span class="dot tram"></span>Tram</button>
        <button class="mode-btn metro" data-mode="metro"><span class="dot metro"></span>Metro</button>
        <button class="mode-btn ferry" data-mode="ferry"><span class="dot ferry"></span>Ferry</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="stat-num" id="stat-vehicles">—</div><div class="stat-lbl">Vehicles</div></div>
      <div class="stat"><div class="stat-num" id="stat-stops">—</div><div class="stat-lbl">Stops</div></div>
      <div class="stat"><div class="stat-num" id="stat-refresh">—</div><div class="stat-lbl">Updated</div></div>
    </div>

    <div class="panel-header">
      <span id="panel-title">Click a stop or vehicle</span>
      <button class="panel-close" id="panel-close" style="display:none">✕</button>
    </div>

    <div id="departures-list">
      <div class="empty-state">
        <span class="icon">🚌</span>
        Click any stop marker on the map to see live departures.
      </div>
    </div>

    <div id="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Initializing…</span>
    </div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    <div class="map-hint" id="map-hint">Click stops or vehicles for details</div>
  </div>
</div>

<script>
const CITIES = {
  oslo:      { lat: 59.9139, lon: 10.7522, zoom: 13, codespace: 'RUT' },
  bergen:    { lat: 60.3913, lon: 5.3221,  zoom: 13, codespace: 'SBT' },
  trondheim: { lat: 63.4305, lon: 10.3951, zoom: 13, codespace: 'ATB' },
  stavanger: { lat: 58.9700, lon: 5.7331,  zoom: 13, codespace: 'KOL' },
};

const MODE_COLORS = {
  bus: '#f78166', rail: '#79c0ff', tram: '#56d364', metro: '#d2a8ff', ferry: '#ffa657',
};

// ── These point to your Vercel /api/* serverless functions ──
const API_VEHICLES = '/api/vehicles';
const API_JOURNEY  = '/api/journey';

let currentCity    = 'oslo';
let activeModes    = new Set(['bus','rail','tram','metro','ferry']);
let vehicleMarkers = new Map();
let stopMarkers    = new Map();
let refreshTimer   = null;

const map = L.map('map', { zoomControl: false });
L.control.zoom({ position: 'bottomright' }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', subdomains: 'abcd', maxZoom: 19
}).addTo(map);
const c0 = CITIES[currentCity];
map.setView([c0.lat, c0.lon], c0.zoom);

function vehicleIcon(mode, line) {
  const color = MODE_COLORS[mode] || '#7d8590';
  const label = (line || '?').substring(0, 4);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="22" viewBox="0 0 36 22">
    <rect x="1" y="1" width="34" height="20" rx="5" fill="#0d1117" stroke="${color}" stroke-width="1.5"/>
    <text x="18" y="14.5" font-family="Space Mono,monospace" font-weight="700" font-size="9"
      text-anchor="middle" fill="${color}">${label}</text></svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [36,22], iconAnchor: [18,11] });
}

function stopIcon(mode) {
  const color = MODE_COLORS[mode] || '#7d8590';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14">
    <circle cx="7" cy="7" r="5" fill="#0d1117" stroke="${color}" stroke-width="2"/>
    <circle cx="7" cy="7" r="2" fill="${color}"/></svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [14,14], iconAnchor: [7,7] });
}

async function enturPost(endpoint, query) {
  const res = await fetch(endpoint, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query }),
  });
  return res.json();
}

async function fetchVehicles(codespace) {
  const json = await enturPost(API_VEHICLES, `{
    vehicles(codespaceId: "${codespace}") {
      vehicleId lastUpdated mode
      line { publicCode }
      destinationName
      location { latitude longitude }
    }
  }`);
  return json.data?.vehicles || [];
}

async function fetchNearbyStops(lat, lon) {
  const json = await enturPost(API_JOURNEY, `{
    stopPlacesByBbox(
      minimumLatitude: ${lat - 0.04}
      maximumLatitude: ${lat + 0.04}
      minimumLongitude: ${lon - 0.07}
      maximumLongitude: ${lon + 0.07}
    ) { id name transportMode latitude longitude }
  }`);
  return json.data?.stopPlacesByBbox || [];
}

async function fetchDepartures(stopId) {
  const json = await enturPost(API_JOURNEY, `{
    stopPlace(id: "${stopId}") {
      id name
      estimatedCalls(numberOfDepartures: 12, timeRange: 3600, omitNonBoarding: true) {
        expectedDepartureTime aimedDepartureTime realtime
        destinationDisplay { frontText }
        serviceJourney { transportMode line { publicCode } }
      }
    }
  }`);
  return json.data?.stopPlace;
}

function normalizeMode(raw) {
  const m = (raw || 'bus').toLowerCase();
  return m === 'water' ? 'ferry' : m;
}

function renderVehicles(vehicles) {
  const seen = new Set();
  for (const v of vehicles) {
    const mode = normalizeMode(v.mode);
    if (!activeModes.has(mode) || !v.location) continue;
    const { latitude: lat, longitude: lon } = v.location;
    const id   = v.vehicleId;
    const line = v.line?.publicCode || '';
    seen.add(id);
    const icon = vehicleIcon(mode, line);
    const ago  = v.lastUpdated ? Math.round((Date.now() - new Date(v.lastUpdated)) / 1000) + 's ago' : '?';
    const popup = `<div class="vehicle-popup-line" style="color:${MODE_COLORS[mode]||'#fff'}">${line || mode}</div>
      <div class="vehicle-popup-dest">${v.destinationName || 'Unknown'}</div>
      <div class="vehicle-popup-updated">Updated ${ago}</div>`;
    if (vehicleMarkers.has(id)) {
      vehicleMarkers.get(id).setLatLng([lat, lon]).setIcon(icon).getPopup().setContent(popup);
    } else {
      vehicleMarkers.set(id, L.marker([lat, lon], { icon, zIndexOffset: 100 }).addTo(map).bindPopup(popup));
    }
  }
  for (const [id, m] of vehicleMarkers) { if (!seen.has(id)) { map.removeLayer(m); vehicleMarkers.delete(id); } }
  document.getElementById('stat-vehicles').textContent = seen.size;
}

function renderStops(stops) {
  const seen = new Set();
  for (const s of stops) {
    if (!s.latitude || !s.longitude) continue;
    const modes = (Array.isArray(s.transportMode) ? s.transportMode : [s.transportMode]).map(normalizeMode);
    const mode = modes.find(m => activeModes.has(m));
    if (!mode) continue;
    seen.add(s.id);
    if (stopMarkers.has(s.id)) continue;
    const marker = L.marker([s.latitude, s.longitude], { icon: stopIcon(mode), zIndexOffset: 0 }).addTo(map);
    marker.on('click', () => loadStopDepartures(s.id, s.name));
    stopMarkers.set(s.id, marker);
  }
  for (const [id, m] of stopMarkers) { if (!seen.has(id)) { map.removeLayer(m); stopMarkers.delete(id); } }
  document.getElementById('stat-stops').textContent = stopMarkers.size;
}

async function loadStopDepartures(stopId, stopName) {
  document.getElementById('panel-title').textContent = 'Departures';
  document.getElementById('panel-close').style.display = 'block';
  document.getElementById('map-hint').classList.add('hidden');
  const list = document.getElementById('departures-list');
  list.innerHTML = `<div class="stop-name-header">${stopName}</div><div class="loading-state">Loading…</div>`;

  const data = await fetchDepartures(stopId);
  if (!data?.estimatedCalls?.length) {
    list.innerHTML = `<div class="stop-name-header">${stopName}</div>
      <div class="empty-state"><span class="icon">🕐</span>No departures in the next hour.</div>`;
    return;
  }

  const now = Date.now();
  let html = `<div class="stop-name-header">${data.name}</div>`;
  for (const call of data.estimatedCalls) {
    const mode    = (call.serviceJourney?.transportMode || 'bus').toLowerCase();
    const line    = call.serviceJourney?.line?.publicCode || '?';
    const dest    = call.destinationDisplay?.frontText || 'Unknown';
    const color   = MODE_COLORS[mode] || '#7d8590';
    const dep     = new Date(call.expectedDepartureTime);
    const aimed   = new Date(call.aimedDepartureTime);
    const mins    = Math.round((dep - now) / 60000);
    const late    = dep - aimed;
    const timeStr = mins <= 0 ? 'Now' : mins === 1 ? '1 min' : `${mins} min`;
    const soon    = mins <= 2;
    const rt      = call.realtime ? `<div class="dep-realtime">● Live${late > 60000 ? ' · ' + Math.round(late/60000) + ' min late' : ''}</div>` : '';
    html += `<div class="departure-row">
      <div class="dep-line" style="background:${color}22;color:${color};border:1px solid ${color}55">${line}</div>
      <div class="dep-dest">${dest}${rt}</div>
      <div class="dep-time${soon ? ' soon' : ''}">${timeStr}</div>
    </div>`;
  }
  list.innerHTML = html;
}

async function refresh() {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'status-dot loading';
  txt.textContent = 'Fetching live data…';
  try {
    const c = CITIES[currentCity];
    const [vehicles, stops] = await Promise.all([fetchVehicles(c.codespace), fetchNearbyStops(c.lat, c.lon)]);
    renderVehicles(vehicles);
    renderStops(stops);
    const t = new Date();
    document.getElementById('stat-refresh').textContent =
      String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0') + ':' + String(t.getSeconds()).padStart(2,'0');
    dot.className = 'status-dot';
    txt.textContent = 'Live · refreshes every 15s';
  } catch(err) {
    dot.className = 'status-dot error';
    txt.textContent = 'Error — check console';
    console.error(err);
  }
}

function switchCity(key) {
  currentCity = key;
  const c = CITIES[key];
  map.setView([c.lat, c.lon], c.zoom);
  for (const m of vehicleMarkers.values()) map.removeLayer(m);
  for (const m of stopMarkers.values())    map.removeLayer(m);
  vehicleMarkers.clear(); stopMarkers.clear();
  document.getElementById('panel-title').textContent = 'Click a stop or vehicle';
  document.getElementById('panel-close').style.display = 'none';
  document.getElementById('departures-list').innerHTML =
    '<div class="empty-state"><span class="icon">🚌</span>Click any stop to see departures.</div>';
  document.getElementById('map-hint').classList.remove('hidden');
  clearTimeout(refreshTimer);
  refresh().then(scheduleRefresh);
}

function scheduleRefresh() { refreshTimer = setTimeout(() => refresh().then(scheduleRefresh), 15000); }

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const mode = btn.dataset.mode;
    if (activeModes.has(mode)) {
      if (activeModes.size === 1) return;
      activeModes.delete(mode); btn.classList.add('dimmed');
    } else {
      activeModes.add(mode); btn.classList.remove('dimmed');
    }
    refresh();
  });
});

document.querySelectorAll('.city-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.city-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    switchCity(btn.dataset.city);
  });
});

document.getElementById('panel-close').addEventListener('click', () => {
  document.getElementById('panel-title').textContent = 'Click a stop or vehicle';
  document.getElementById('panel-close').style.display = 'none';
  document.getElementById('departures-list').innerHTML =
    '<div class="empty-state"><span class="icon">🚌</span>Click any stop to see departures.</div>';
  document.getElementById('map-hint').classList.remove('hidden');
});

map.on('click', () => document.getElementById('map-hint').classList.add('hidden'));

// Init mode buttons as active
document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('dimmed'));

refresh().then(scheduleRefresh);
</script>
</body>
</html>
